<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4753f"/>
      <stop offset="100%" stop-color="#6e2e0e"/>
    </linearGradient>
  </defs>

  <!-- Full bleed (maskable — no rounded corners) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <ellipse cx="100" cy="90" rx="200" ry="170" fill="rgba(255,210,160,0.1)"/>

  <!-- Waveform scaled to fit maskable safe zone (56px padding each side) -->
  <!-- bar width 34, gap 14, 7 bars, total = 7*34+6*14 = 238+84 = 322, start x = (512-322)/2 = 95 -->

  <rect x="95"  y="228" width="34" height="68"  rx="17" fill="white" opacity="0.55"/>
  <rect x="143" y="198" width="34" height="120" rx="17" fill="white" opacity="0.72"/>
  <rect x="191" y="168" width="34" height="178" rx="17" fill="white" opacity="0.88"/>
  <rect x="239" y="148" width="34" height="216" rx="17" fill="white" opacity="1"/>
  <rect x="287" y="168" width="34" height="178" rx="17" fill="white" opacity="0.88"/>
  <rect x="335" y="198" width="34" height="120" rx="17" fill="white" opacity="0.72"/>
  <rect x="383" y="228" width="34" height="68"  rx="17" fill="white" opacity="0.55"/>
</svg>
